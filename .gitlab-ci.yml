stages:
  - check
  - build
  - release

variables:
  CARGO_TERM_COLOR: always
  DEBIAN_FRONTEND: noninteractive
  PACKAGE_NAME: boot_catcher_rs
  RELEASE_ARCHIVE: boot_catcher_rs-linux-x86_64.tar.gz

.rust-linux:
  image: rust:latest
  before_script:
    - apt-get update
    - apt-get install -y --no-install-recommends pkg-config libx11-dev libxtst-dev libxext-dev ca-certificates tar gzip
    - rustc --version
    - cargo --version

check:
  extends: .rust-linux
  stage: check
  script:
    - rustup component add rustfmt
    - cargo fmt -- --check
    - cargo check --locked
    - cargo test --locked
  rules:
    - if: $CI_COMMIT_BRANCH
    - if: $CI_COMMIT_TAG

linux_release:
  extends: .rust-linux
  stage: build
  script:
    - cargo build --release --locked
    - mkdir -p dist package
    - cp target/release/${PACKAGE_NAME} package/${PACKAGE_NAME}
    - cp README.md LICENSE boot_flying_template.png package/
    - chmod +x package/${PACKAGE_NAME}
    - tar -czf dist/${RELEASE_ARCHIVE} -C package .
    - cp target/release/${PACKAGE_NAME} dist/${PACKAGE_NAME}
    - sha256sum dist/${RELEASE_ARCHIVE} dist/${PACKAGE_NAME} > dist/SHA256SUMS
    - ls -lh dist
  artifacts:
    name: "${PACKAGE_NAME}-${CI_COMMIT_REF_SLUG}-linux-x86_64"
    expire_in: 30 days
    paths:
      - dist/${RELEASE_ARCHIVE}
      - dist/${PACKAGE_NAME}
      - dist/SHA256SUMS
  rules:
    - if: $CI_COMMIT_BRANCH
    - if: $CI_COMMIT_TAG

release:
  image: registry.gitlab.com/gitlab-org/release-cli:latest
  stage: release
  needs:
    - job: linux_release
      artifacts: true
  rules:
    - if: $CI_COMMIT_TAG
  script:
    - echo "Creating GitLab release ${CI_COMMIT_TAG}"
  release:
    tag_name: "$CI_COMMIT_TAG"
    name: "Boot Catcher Linux $CI_COMMIT_TAG"
    description: |
      Linux/X11/XWayland release build for Dota 2 Boot Catcher.

      Download the binary archive from the linked job artifact below.
    assets:
      links:
        - name: "boot_catcher_rs-linux-x86_64.tar.gz"
          url: "${CI_PROJECT_URL}/-/jobs/artifacts/${CI_COMMIT_TAG}/raw/dist/boot_catcher_rs-linux-x86_64.tar.gz?job=linux_release"
        - name: "SHA256SUMS"
          url: "${CI_PROJECT_URL}/-/jobs/artifacts/${CI_COMMIT_TAG}/raw/dist/SHA256SUMS?job=linux_release"
